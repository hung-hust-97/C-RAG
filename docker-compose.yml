services:
  postgres:
    image: postgres:17-bullseye
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-crag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT_EXPOSE:-5432}:5432"

  neo4j:
    image: neo4j:5.26.0
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/Cmcati2026}
      NEO4J_dbms_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-1g}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2g}
      NEO4J_dbms_memory_pagecache_size: ${NEO4J_PAGECACHE:-1g}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >-
      etcd -advertise-client-urls=http://etcd:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.5.11
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19531}:19530"
      - "${MILVUS_HEALTH_PORT:-19091}:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  attu:
    image: zilliz/attu:v2.6.4
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "${ATTU_PORT:-3010}:3000"
    depends_on:
      - milvus

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HOST:-0.0.0.0}:${PORT:-9621}:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./data/logs:/app/data/logs
      - ./config.ini:/app/config.ini
      - ./.env:/app/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCUMENT_LOADING_ENGINE: "DOCLING"
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      HOST: "0.0.0.0"
      PORT: "9621"
      EMBEDDING_USE_CELERY: ${EMBEDDING_USE_CELERY:-false}
      EMBEDDING_CELERY_BROKER_URL: ${EMBEDDING_CELERY_BROKER_URL:-redis://redis:6379/0}
      EMBEDDING_CELERY_RESULT_BACKEND: ${EMBEDDING_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      EMBEDDING_CELERY_QUEUE: ${EMBEDDING_CELERY_QUEUE:-embedding}
      EMBEDDING_CELERY_RESULT_TIMEOUT: ${EMBEDDING_CELERY_RESULT_TIMEOUT:-300}
      EMBEDDING_CLIENT_MAX_CONCURRENCY: ${EMBEDDING_CLIENT_MAX_CONCURRENCY:-2}
      EMBEDDING_HTTP_TIMEOUT: ${EMBEDDING_HTTP_TIMEOUT:-120}
      EMBEDDING_WORKER_EXECUTION_TIMEOUT: ${EMBEDDING_WORKER_EXECUTION_TIMEOUT:-240}
      LIGHTRAG_LOG_DIR: ${LIGHTRAG_LOG_DIR:-/app/data/logs}
      LIGHTRAG_LOG_LEVEL: ${LIGHTRAG_LOG_LEVEL:-INFO}
      LIGHTRAG_ERROR_LOG_LEVEL: ${LIGHTRAG_ERROR_LOG_LEVEL:-ERROR}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
