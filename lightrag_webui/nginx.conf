server {
    listen 80;
    server_name _;

    # Serve static UI files
    location /webui/ {
        alias /usr/share/nginx/html/webui/;
        try_files $uri $uri/ /webui/index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://lightrag:9621/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy documentation endpoints
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://lightrag:9621$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy static assets served by FastAPI
    location /static/ {
        proxy_pass http://lightrag:9621/static/;
    }
}
